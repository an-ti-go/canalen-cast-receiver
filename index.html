<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Canalen</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Google Sans', sans-serif; color: #fff; }
    #player { width: 100%; height: 100%; object-fit: contain; }

    /* ── Now Playing overlay ─────────────────────────────────────── */
    #now-playing {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 32px 48px;
      background: linear-gradient(transparent, rgba(0,0,0,0.85));
      display: flex;
      align-items: flex-end;
      gap: 24px;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    #now-playing.visible { opacity: 1; }

    #artwork {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: #1a1a1a;
      display: none;
    }
    #artwork.visible { display: block; }

    #meta { display: flex; flex-direction: column; gap: 4px; }
    #title { font-size: 28px; font-weight: 600; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
    #subtitle-text { font-size: 18px; color: rgba(255,255,255,0.7); }

    #live-badge {
      display: none;
      background: #e53935;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 10px;
      border-radius: 4px;
      align-self: flex-start;
      margin-top: 4px;
    }
    #live-badge.visible { display: inline-block; }

    /* ── Buffering spinner ───────────────────────────────────────── */
    #buffering {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    #buffering.visible { display: flex; }
    .spinner {
      width: 56px; height: 56px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #buffering-label { font-size: 16px; color: rgba(255,255,255,0.7); }

    /* ── Subtitle overlay ───────────────────────────────────────── */
    #subtitle-overlay {
      position: fixed;
      bottom: 80px; left: 0; right: 0;
      text-align: center;
      pointer-events: none;
      padding: 0 80px;
    }
    #subtitle-text-box {
      display: inline-block;
      background: rgba(0,0,0,0.75);
      color: #fff;
      font-size: 32px;
      line-height: 1.4;
      padding: 6px 16px;
      border-radius: 6px;
      white-space: pre-wrap;
      max-width: 100%;
      visibility: hidden;
    }

    /* ── Error overlay ───────────────────────────────────────────── */
    #error-overlay {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 16px;
      padding: 32px 48px;
      text-align: center;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      max-width: 560px;
    }
    #error-overlay.visible { display: flex; }
    #error-icon { font-size: 48px; }
    #error-title { font-size: 22px; font-weight: 600; }
    #error-detail { font-size: 15px; color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <video id="player" autoplay playsinline></video>

  <!-- Now Playing -->
  <div id="now-playing">
    <img id="artwork" alt="">
    <div id="meta">
      <div id="title"></div>
      <div id="subtitle-text"></div>
      <div id="live-badge">LIVE</div>
    </div>
  </div>

  <!-- Subtitles -->
  <div id="subtitle-overlay">
    <span id="subtitle-text-box"></span>
  </div>

  <!-- Buffering -->
  <div id="buffering">
    <div class="spinner"></div>
    <div id="buffering-label">Loading…</div>
  </div>

  <!-- Error -->
  <div id="error-overlay">
    <div id="error-icon">⚠️</div>
    <div id="error-title">Playback Error</div>
    <div id="error-detail"></div>
  </div>

  <script>
    'use strict';

    const video         = document.getElementById('player');
    const nowPlaying    = document.getElementById('now-playing');
    const artworkEl     = document.getElementById('artwork');
    const titleEl       = document.getElementById('title');
    const subtitleEl    = document.getElementById('subtitle-text');
    const liveBadge     = document.getElementById('live-badge');
    const bufferingEl   = document.getElementById('buffering');
    const bufferingLabel= document.getElementById('buffering-label');
    const errorOverlay  = document.getElementById('error-overlay');
    const errorDetail   = document.getElementById('error-detail');

    const context       = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    playerManager.setMediaElement(video);

    let hls          = null;
    let overlayTimer = null;

    // ── UI helpers ────────────────────────────────────────────────

    function showNowPlaying(title, subtitle, artworkUrl, live) {
      titleEl.textContent    = title    || '';
      subtitleEl.textContent = subtitle || '';
      liveBadge.classList.toggle('visible', !!live);

      if (artworkUrl) {
        artworkEl.src = artworkUrl;
        artworkEl.classList.add('visible');
      } else {
        artworkEl.classList.remove('visible');
      }

      nowPlaying.classList.add('visible');
      clearTimeout(overlayTimer);
      overlayTimer = setTimeout(() => nowPlaying.classList.remove('visible'), 5000);
    }

    function hideNowPlaying() {
      nowPlaying.classList.remove('visible');
      clearTimeout(overlayTimer);
    }

    function showBuffering(label) {
      bufferingLabel.textContent = label || 'Loading…';
      bufferingEl.classList.add('visible');
      errorOverlay.classList.remove('visible');
    }

    function hideBuffering() {
      bufferingEl.classList.remove('visible');
    }

    function showError(detail) {
      hideBuffering();
      hideNowPlaying();
      errorOverlay.classList.add('visible');
      errorDetail.textContent = detail || 'An unknown error occurred.';
    }

    function hideError() {
      errorOverlay.classList.remove('visible');
    }

    // ── Video element events ──────────────────────────────────────

    video.addEventListener('waiting',  () => showBuffering('Buffering…'));
    video.addEventListener('playing',  () => {
      hideBuffering();
      hideError();
      // Detect audio-only playback: videoWidth stays 0 if the video codec is not
      // supported (common with H.265/HEVC on older Chromecast models).
      setTimeout(() => {
        if (!video.paused && video.videoWidth === 0 && video.duration !== 0) {
          showError('This video uses a codec not supported by this device (likely H.265/HEVC). It cannot be cast.');
        }
      }, 2000);
    });
    video.addEventListener('stalled',  () => showBuffering('Reconnecting…'));
    video.addEventListener('error', () => {
      if (!video.currentSrc) return; // ignore errors from reset (video.src = '')
      showError('This video could not be played on this device. Try a different title or play it directly on your phone.');
    });

    // ── HLS helpers ───────────────────────────────────────────────

    function isHlsUrl(url, contentType) {
      if (!url) return false;
      if (/\.m3u8(\?|$)/i.test(url)) return true;
      const ct = (contentType || '').toLowerCase();
      return ct === 'application/x-mpegurl' || ct === 'application/vnd.apple.mpegurl';
    }

    function teardownHls() {
      if (hls) { hls.destroy(); hls = null; }
    }

    function loadMedia(url, contentType) {
      hideError();
      showBuffering('Loading…');
      teardownHls();
      video.src = '';
      video.load();

      if (isHlsUrl(url, contentType) && Hls.isSupported()) {
        hls = new Hls({
          enableWorker: false,
          liveSyncDurationCount: 3,
          liveMaxLatencyDurationCount: 10,
        });
        hls.on(Hls.Events.ERROR, function (event, data) {
          if (data.fatal) {
            console.error('[hls.js] fatal error', data.type, data.details);
            switch (data.type) {
              case Hls.ErrorTypes.NETWORK_ERROR:
                showBuffering('Reconnecting…');
                hls.startLoad();
                break;
              case Hls.ErrorTypes.MEDIA_ERROR:
                showBuffering('Recovering…');
                hls.recoverMediaError();
                break;
              default:
                teardownHls();
                showError('Stream error: ' + data.details + '. Try playing again from your phone.');
                break;
            }
          }
        });
        hls.loadSource(url);
        hls.attachMedia(video);
      } else {
        video.src = url;
      }

      video.play().catch(err => console.warn('[player] autoplay blocked:', err));
    }

    // ── LOAD interceptor ──────────────────────────────────────────

    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      request => {
        const media    = request.media;
        const url      = media.contentUrl || media.contentId;
        const metadata = media.metadata || {};

        const isLive   = media.streamType === cast.framework.messages.StreamType.LIVE
                      || isHlsUrl(url, media.contentType);
        const title    = metadata.title    || '';
        const subtitle = metadata.subtitle || '';
        const artwork  = (metadata.images && metadata.images[0]) ? metadata.images[0].url : null;

        console.log('[receiver] LOAD url=' + url + ' live=' + isLive + ' title=' + title);

        loadMedia(url, media.contentType);
        showNowPlaying(title, subtitle, artwork, isLive);

        return request;
      }
    );

    // ── Subtitle support ──────────────────────────────────────────

    const SUBTITLE_NAMESPACE = 'urn:x-cast:com.canalen.subtitles';
    const subtitleBox = document.getElementById('subtitle-text-box');

    let subtitleCues = []; // [{start, end, text}] in seconds

    function parseSrt(text) {
      const cues = [];
      // Normalize line endings
      const blocks = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim().split(/\n{2,}/);
      const timeRe = /(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/;
      for (const block of blocks) {
        const lines = block.trim().split('\n');
        if (lines.length < 2) continue;
        // Skip numeric index line if present
        const startLine = /^\d+$/.test(lines[0].trim()) ? 1 : 0;
        const match = lines[startLine]?.match(timeRe);
        if (!match) continue;
        const toSec = (h, m, s, ms) => +h * 3600 + +m * 60 + +s + +ms / 1000;
        const start = toSec(match[1], match[2], match[3], match[4]);
        const end   = toSec(match[5], match[6], match[7], match[8]);
        const text  = lines.slice(startLine + 1).join('\n').replace(/<[^>]+>/g, '').trim();
        if (text) cues.push({ start, end, text });
      }
      return cues;
    }

    function parseVtt(text) {
      // Strip WEBVTT header and use same time regex as SRT
      const stripped = text.replace(/^WEBVTT[^\n]*\n/, '');
      return parseSrt(stripped);
    }

    function updateSubtitles() {
      if (subtitleCues.length === 0) { subtitleBox.style.visibility = 'hidden'; return; }
      const t = video.currentTime;
      const cue = subtitleCues.find(c => t >= c.start && t <= c.end);
      if (cue) {
        subtitleBox.textContent = cue.text;
        subtitleBox.style.visibility = 'visible';
      } else {
        subtitleBox.style.visibility = 'hidden';
      }
    }

    setInterval(updateSubtitles, 100);

    function clearSubtitles() {
      subtitleCues = [];
      subtitleBox.style.visibility = 'hidden';
      subtitleBox.textContent = '';
    }

    async function loadSubtitleFromUrl(url, mimeType) {
      try {
        const resp = await fetch(url);
        if (!resp.ok) { console.error('[subtitles] fetch failed', resp.status); return; }
        const text = await resp.text();
        const isVtt = mimeType === 'text/vtt' || url.toLowerCase().includes('.vtt');
        subtitleCues = isVtt ? parseVtt(text) : parseSrt(text);
        console.log('[subtitles] loaded', subtitleCues.length, 'cues');
      } catch (e) {
        console.error('[subtitles] load error', e);
      }
    }

    context.addCustomMessageListener(SUBTITLE_NAMESPACE, (customEvent) => {
      try {
        const msg = typeof customEvent.data === 'string'
          ? JSON.parse(customEvent.data)
          : customEvent.data;
        if (msg.action === 'load' && msg.url) {
          loadSubtitleFromUrl(msg.url, msg.mimeType || '');
        } else if (msg.action === 'clear') {
          clearSubtitles();
        }
      } catch (e) {
        console.error('[subtitles] message parse error', e);
      }
    });

    context.start({ touchScreenOptimizedApp: false });
  </script>
</body>
</html>
