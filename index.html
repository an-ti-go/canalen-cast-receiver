<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Canalen</title>
  <!--
    Cast Application Framework v3 (Web Receiver SDK).
    Must be loaded before any cast.framework usage.
  -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    #player { width: 100%; height: 100%; object-fit: contain; }
  </style>
</head>
<body>
  <video id="player" autoplay playsinline></video>

  <script>
    'use strict';

    const video   = document.getElementById('player');
    const context = cast.framework.CastReceiverContext.getInstance();
    const playerManager = context.getPlayerManager();

    // Tell CAF to use our <video> element so PLAY/PAUSE/SEEK commands and
    // media status reporting continue to work.
    playerManager.setMediaElement(video);

    function isHlsUrl(url, contentType) {
      if (!url) return false;
      if (/\.m3u8(\?|$)/i.test(url)) return true;
      const ct = (contentType || '').toLowerCase();
      return ct === 'application/x-mpegurl' || ct === 'application/vnd.apple.mpegurl';
    }

    // Intercept LOAD requests from the sender app.
    playerManager.setMessageInterceptor(
      cast.framework.messages.MessageType.LOAD,
      request => {
        const media = request.media;
        const url   = media.contentUrl || media.contentId;
        console.log('[receiver] LOAD url=' + url + ' contentType=' + media.contentType);

        if (isHlsUrl(url, media.contentType)) {
          // HLS (live channels, catch-up): CAF v3's built-in MPL handles HLS
          // natively via MSE — no external library needed. Just return the
          // request and CAF will take care of it.
          return request;
        }

        // Non-HLS formats (MKV, MP4, TS, etc.): set src directly.
        // Chromecast Ultra / 4K hardware decoders handle MKV/HEVC natively.
        video.src = url;
        video.play().catch(err => console.warn('[player] autoplay blocked:', err));
        return request;
      }
    );

    context.start({ touchScreenOptimizedApp: false });
  </script>
</body>
</html>
